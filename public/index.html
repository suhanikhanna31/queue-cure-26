<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mediqueue System</title>
  <script src="/socket.io/socket.io.js"></script>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <header><h1>MEDIQUEUE SYSTEM</h1></header>
  
  <main class="grid-container">
    <section class="card" id="reception">
      <h2>SCREEN 1: Reception Desk</h2>
      <input type="text" id="nameInput" placeholder="Enter full name...">
      <button id="addBtn">+ ADD</button>
      <button id="callBtn" class="yellow-btn">CALL NEXT ></button>
      <button id="undoBtn">UNDO</button>
      
      <div id="queueList">
        </div>
    </section>

    <section class="card" id="waiting-room">
      <h2>SCREEN 2: Waiting Room Board</h2>
      <div class="yellow-box">
        NOW SERVING: <span id="currentPatient">- AWAITING FIRST CALL -</span>
      </div>
      
      <div class="telemetry">
        <div class="box">WAITING: <span id="waitCount">0</span></div>
        <div class="box">AVG PACE: <span id="avgPace">-</span></div>
        <div class="box">HISTORY: <span id="historyCount">0</span></div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
